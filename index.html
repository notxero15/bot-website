<!DOCTYPE html>
<html>
<head>
  <title>Chromify Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b10);
    }

    .title {
      font-size: 54px;
      font-weight: bold;
      background: linear-gradient(90deg, #5865F2, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 26px;
      border: none;
      border-radius: 10px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #4752c4;
    }

    .section {
      padding: 50px 20px;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: #151522;
      padding: 18px;
      width: 220px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #5865F2;
    }

    .footer {
      margin-top: 60px;
      padding: 30px;
      border-top: 1px solid #222;
      color: #666;
      font-size: 13px;
    }

    .footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      color: #5865F2;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="title">🎨 Chromify</div>
  <div class="subtitle">Modern multi-server color role system for Discord</div>

  <a href="https://discord.com/oauth2/authorize?client_id=1495417079069937765&permissions=268504128&integration_type=0&scope=bot+applications.commands" target="_blank">
    <button class="btn">Invite Bot</button>
  </a>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>✨ Features</h2>

  <div class="grid">
    <div class="card">🎨 Reaction Roles</div>
    <div class="card">⚡ Slash Commands</div>
    <div class="card">🌍 Multi-Server</div>
    <div class="card">🔒 Secure System</div>
  </div>
</div>

<!-- COMMANDS -->
<div class="section">
  <h2>📌 Commands</h2>

  <div class="grid">
    <div class="card">/colorpanel</div>
    <div class="card">/colorpaneldelete</div>
    <div class="card">/help</div>
    <div class="card">/about</div>
    <div class="card">/ping</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Chromify Bot • Clean • Fast • Modern
  <br><br>
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

</body>
</html>
