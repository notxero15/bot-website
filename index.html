<!DOCTYPE html>
<html>
<head>
  <title>Chromify Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      padding: 18px 25px;
      background: #11111a;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #5865F2;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4752c4;
      transform: scale(1.05);
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 40px 20px;
    }

    .title {
      font-size: 34px;
      font-weight: bold;
    }

    .subtitle {
      color: #aaa;
      margin-top: 5px;
    }

    /* GRID */
    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #151522;
      padding: 18px;
      width: 250px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.3s;
      text-align: left;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #5865F2;
      box-shadow: 0 0 15px rgba(88,101,242,0.25);
    }

    .label {
      color: #888;
      font-size: 13px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
      margin-top: 5px;
    }

    .dot {
      height: 10px;
      width: 10px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ACTION CARDS */
    .action {
      text-align: center;
    }

    a {
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      padding: 25px;
      text-align: center;
      border-top: 1px solid #222;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🎨 Chromify Dashboard</div>

  <a href="index.html">
    <button class="btn">Home</button>
  </a>
</div>

<!-- HEADER -->
<div class="header">
  <div class="title">Bot Control Panel</div>
  <div class="subtitle">Live system overview & management</div>
</div>

<!-- STATS -->
<div class="grid">

  <div class="card">
    <div class="label"><span class="dot"></span> STATUS</div>
    <div class="value">Online</div>
  </div>

  <div class="card">
    <div class="label">📡 SERVERS</div>
    <div class="value">2 Servers</div>
  </div>

  <div class="card">
    <div class="label">⏱ UPTIME</div>
    <div class="value">Running</div>
  </div>

  <div class="card">
    <div class="label">📶 PING</div>
    <div class="value">~60ms</div>
  </div>

</div>

<!-- ACTIONS -->
<div class="grid">

  <div class="card action">
    <p>⚡ Invite Bot</p>
    <a href="YOUR_INVITE_LINK">
      <button class="btn">Open Invite</button>
    </a>
  </div>

  <div class="card action">
    <p>📄 Privacy Policy</p>
    <a href="privacy.html">
      <button class="btn">Open</button>
    </a>
  </div>

  <div class="card action">
    <p>📜 Terms</p>
    <a href="terms.html">
      <button class="btn">Open</button>
    </a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Chromify Dashboard • Clean • Fast • Modern
</div>

</body>
</html>
