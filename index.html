<!DOCTYPE html>
<html>
<head>
  <title>Chromify Bot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
    }

    .subtitle {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #5865F2;
      color: white;
      font-size: 16px;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="title">🎨 Chromify Bot</div>
    <div class="subtitle">Multi-server color role system for Discord servers</div>

    <a href="YOUR_INVITE_LINK">
      <button class="btn">Invite Bot</button>
    </a>
  </div>

  <div class="section">
    <h2>✨ Features</h2>

    <div class="card">🎨 Reaction Color Roles</div>
    <div class="card">⚡ Fast Slash Commands</div>
    <div class="card">🌍 Multi-Server Support</div>
  </div>

  <div class="section">
    <h2>📌 Commands</h2>

    <div class="card">/colorpanel</div>
    <div class="card">/colorpaneldelete</div>
    <div class="card">/help</div>
    <div class="card">/about</div>
  </div>

  <div class="section">
    <p style="color:#666;">Made for Discord servers • Simple • Fast • Clean</p>
  </div>

</body>
</html>
