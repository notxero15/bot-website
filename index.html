<!DOCTYPE html>
<html>
<head>
  <title>Chromify Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
      text-align: center;
    }

    .topbar {
      padding: 20px;
      background: #11111a;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #5865F2;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4752c4;
    }

    .hero {
      padding: 50px 20px;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
    }

    .subtitle {
      color: #aaa;
      margin-top: 5px;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 30px;
    }

    .card {
      background: #151522;
      padding: 18px;
      width: 230px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #5865F2;
      box-shadow: 0 0 15px rgba(88,101,242,0.3);
    }

    .status-dot {
      height: 10px;
      width: 10px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    .footer {
      margin-top: 50px;
      padding: 30px;
      border-top: 1px solid #222;
      color: #666;
      font-size: 13px;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🎨 Chromify Dashboard</div>

  <div>
    <a href="index.html">
      <button class="btn">Home</button>
    </a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="title">Bot Control Panel</div>
  <div class="subtitle">Manage and view your Discord bot system</div>
</div>

<!-- STATS -->
<div class="grid">

  <div class="card">
    <p><span class="status-dot"></span> Status</p>
    <h3>Online</h3>
  </div>

  <div class="card">
    <p>📡 Servers</p>
    <h3>Connected</h3>
  </div>

  <div class="card">
    <p>⏱ Uptime</p>
    <h3>Running</h3>
  </div>

  <div class="card">
    <p>📶 Ping</p>
    <h3>Stable</h3>
  </div>

</div>

<!-- QUICK ACTIONS -->
<div class="grid">

  <div class="card">
    <p>⚡ Invite Bot</p>
    <a href="YOUR_INVITE_LINK">
      <button class="btn">Open Invite</button>
    </a>
  </div>

  <div class="card">
    <p>📄 Legal</p>
    <a href="privacy.html">
      <button class="btn">Privacy</button>
    </a>
  </div>

  <div class="card">
    <p>📜 Terms</p>
    <a href="terms.html">
      <button class="btn">Terms</button>
    </a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Chromify Dashboard • Clean • Fast • Modern
</div>

</body>
</html>
