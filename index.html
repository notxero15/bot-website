<!DOCTYPE html>
<html>
<head>
  <title>Chromify Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0b10;
      color: white;
      text-align: center;
    }

    /* =========================
       HERO (CLEAN + PREMIUM LOOK)
    ========================= */
    .hero {
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(
        135deg,
        #0b0b10,
        #12122a,
        #0b0b10
      );
      overflow: hidden;
    }

    /* subtle glow effect */
    .hero::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(88,101,242,0.25), transparent 60%);
      top: -200px;
      left: -150px;
      filter: blur(40px);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: 56px;
      font-weight: bold;
      background: linear-gradient(90deg, #5865F2, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #b8b8c7;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 26px;
      border: none;
      border-radius: 10px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.25s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #4752c4;
    }

    /* =========================
       SECTIONS
    ========================= */
    .section {
      padding: 55px 20px;
    }

    h2 {
      color: #e5e5e5;
      margin-bottom: 20px;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: #151522;
      padding: 18px;
      width: 220px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #5865F2;
      box-shadow: 0 0 18px rgba(88,101,242,0.25);
    }

    /* =========================
       FOOTER
    ========================= */
    .footer {
      margin-top: 60px;
      padding: 35px;
      border-top: 1px solid #222;
      color: #666;
      font-size: 13px;
    }

    .footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      color: #5865F2;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">

    <div class="title">Chromify</div>

    <div class="subtitle">
      Modern multi-server color role system for Discord
    </div>

    <a href="https://discord.com/oauth2/authorize?client_id=1495417079069937765&permissions=268504128&integration_type=0&scope=bot+applications.commands" target="_blank">
      <button class="btn">Invite Bot</button>
    </a>

  </div>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>✨ Features</h2>

  <div class="grid">
    <div class="card">🎨 Reaction Roles</div>
    <div class="card">⚡ Slash Commands</div>
    <div class="card">🌍 Multi-Server Support</div>
    <div class="card">🔒 Secure System</div>
  </div>
</div>

<!-- COMMANDS -->
<div class="section">
  <h2>📌 Commands</h2>

  <div class="grid">
    <div class="card">/colorpanel</div>
    <div class="card">/colorpaneldelete</div>
    <div class="card">/help</div>
    <div class="card">/about</div>
    <div class="card">/ping</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Chromify Bot • Clean • Fast • Modern
  <br><br>
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

</body>
</html>
