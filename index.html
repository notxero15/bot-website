<!DOCTYPE html>
<html>
<head>
  <title>Chromify Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b10;
      color: white;
      text-align: center;
      padding-top: 70px; /* space for banner */
    }

    /* =========================
       TOP BANNER
    ========================= */
    #topBanner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(15, 15, 20, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 999;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #topBanner.hidden {
      opacity: 0;
      transform: translateY(-100%);
      pointer-events: none;
    }

    #topBanner img {
      height: 28px;
      width: 28px;
      border-radius: 8px;
    }

    #topBanner span {
      font-weight: bold;
      font-size: 18px;
      color: white;
    }

    /* =========================
       HERO
    ========================= */
    .hero {
      padding: 100px 20px;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b10);
    }

    .title {
      font-size: 54px;
      font-weight: bold;
      background: linear-gradient(90deg, #5865F2, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 26px;
      border: none;
      border-radius: 10px;
      background: #5865F2;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #4752c4;
    }

    /* =========================
       SECTIONS
    ========================= */
    .section {
      padding: 50px 20px;
    }

    h2 {
      color: #ddd;
    }

    .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: #151522;
      padding: 18px;
      width: 220px;
      border-radius: 12px;
      border: 1px solid #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #5865F2;
    }

    /* =========================
       FOOTER
    ========================= */
    .footer {
      margin-top: 60px;
      padding: 30px;
      border-top: 1px solid #222;
      color: #666;
      font-size: 13px;
    }

    .footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      color: #5865F2;
    }
  </style>
</head>

<body>

<!-- TOP BANNER -->
<div id="topBanner">
  <img src="YOUR_LOGO_URL" alt="logo">
  <span>Chromify</span>
</div>

<!-- HERO -->
<div class="hero">
  <div class="title">🎨 Chromify</div>
  <div class="subtitle">Modern multi-server color role system for Discord</div>

  <a href="https://discord.com/oauth2/authorize?client_id=1495417079069937765&permissions=268504128&integration_type=0&scope=bot+applications.commands" target="_blank">
    <button class="btn">Invite Bot</button>
  </a>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>✨ Features</h2>

  <div class="grid">
    <div class="card">🎨 Reaction Roles</div>
    <div class="card">⚡ Slash Commands</div>
    <div class="card">🌍 Multi-Server</div>
    <div class="card">🔒 Secure System</div>
  </div>
</div>

<!-- COMMANDS -->
<div class="section">
  <h2>📌 Commands</h2>

  <div class="grid">
    <div class="card">/colorpanel</div>
    <div class="card">/colorpaneldelete</div>
    <div class="card">/help</div>
    <div class="card">/about</div>
    <div class="card">/ping</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Chromify Bot • Clean • Fast • Modern
  <br><br>
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>

<!-- =========================
     SCROLL SCRIPT (BANNER)
========================= -->
<script>
let lastScrollY = window.scrollY;
const banner = document.getElementById("topBanner");

window.addEventListener("scroll", () => {
  const currentScrollY = window.scrollY;

  if (currentScrollY > lastScrollY) {
    banner.classList.add("hidden"); // scroll down → hide
  } else {
    banner.classList.remove("hidden"); // scroll up → show
  }

  lastScrollY = currentScrollY;
});
</script>

</body>
</html>
